name: Autobump

on:
  schedule:
    - cron: '23 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Check latest Multipass release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch all recent releases once; filter to those that have a macOS .pkg asset.
          # This skips releases that were tagged but whose assets haven't been uploaded yet.
          ALL=$(gh api repos/canonical/multipass/releases)

          STABLE=$(echo "$ALL" | jq '[.[] | select(.prerelease == false)
            | select(any(.assets[]; .name | test("mac-Darwin\\.pkg$")))] | .[0]')
          PRERELEASE=$(echo "$ALL" | jq '[.[]
            | select(any(.assets[]; .name | test("mac-Darwin\\.pkg$")))] | .[0]')

          STABLE_DATE=$(echo "$STABLE"    | jq -r '.published_at // empty')
          PRERELEASE_DATE=$(echo "$PRERELEASE" | jq -r '.published_at // empty')

          if [ -z "$STABLE_DATE" ] && [ -z "$PRERELEASE_DATE" ]; then
            echo "No releases with macOS assets found — skipping"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "asset_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$PRERELEASE_DATE" > "$STABLE_DATE" ]]; then
            RELEASE="$PRERELEASE"
          else
            RELEASE="$STABLE"
          fi

          VERSION=$(echo "$RELEASE" | jq -r '.tag_name' | sed 's/^v//')
          ASSET_URL=$(echo "$RELEASE" | jq -r \
            '.assets[] | select(.name | test("mac-Darwin\\.pkg$")) | .browser_download_url')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "asset_url=$ASSET_URL" >> "$GITHUB_OUTPUT"

      - name: Compare with cask version
        id: compare
        run: |
          CURRENT=$(grep '^  version ' Casks/multipass.rb | sed 's/.*"\(.*\)"/\1/')
          VERSION="${{ steps.release.outputs.version }}"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ -z "$VERSION" ] || [ "$CURRENT" = "$VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download and compute SHA256
        if: steps.compare.outputs.skip == 'false'
        run: |
          curl -fL -o /tmp/multipass.pkg "${{ steps.release.outputs.asset_url }}"
          SHA=$(shasum -a 256 /tmp/multipass.pkg | cut -d' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_ENV"

      - name: Update cask and create versioned cask
        if: steps.compare.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.release.outputs.version }}"

          # Update the rolling "latest" cask
          sed -i '' "s/^  version \".*\"/  version \"$VERSION\"/" Casks/multipass.rb
          sed -i '' "s/^  sha256 \".*\"/  sha256 \"$sha256\"/" Casks/multipass.rb

          # Mint a pinned versioned cask if it does not exist yet
          VERSIONED="Casks/multipass@${VERSION}.rb"
          if [ ! -f "$VERSIONED" ]; then
            cat > "$VERSIONED" << TEMPLATE
cask "multipass@${VERSION}" do
  version "${VERSION}"
  sha256 "${sha256}"

  url "https://github.com/canonical/multipass/releases/download/v#{version}/multipass-#{version}+mac-Darwin.pkg"
  name "Multipass"
  desc "Orchestrates virtual Ubuntu instances"
  homepage "https://github.com/canonical/multipass/"

  depends_on macos: :ventura

  pkg "multipass-#{version}+mac-Darwin.pkg"

  on_arm do
    postflight do
      File.symlink("/Library/Application Support/com.canonical.multipass/Resources/completions/bash/multipass",
                   "#{HOMEBREW_PREFIX}/etc/bash_completion.d/multipass")
    end
  end

  uninstall launchctl: "com.canonical.multipassd",
            pkgutil:   "com.canonical.multipass.*",
            delete:    [
              "#{HOMEBREW_PREFIX}/etc/bash_completion.d/multipass",
              "/Applications/Multipass.app",
              "/Library/Application Support/com.canonical.multipass",
              "/Library/Logs/Multipass",
              "/usr/local/bin/multipass",
              "/usr/local/etc/bash_completion.d/multipass",
            ]

  zap trash: [
    "~/Library/Application Support/com.canonical.multipassGui",
    "~/Library/Application Support/multipass",
    "~/Library/Application Support/multipass-gui",
    "~/Library/LaunchAgents/com.canonical.multipass.gui.autostart.plist",
    "~/Library/Preferences/multipass",
    "~/Library/Saved Application State/com.canonical.multipassGui.savedState",
  ]
end
TEMPLATE
          fi

      - name: Open PR
        if: steps.compare.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          BRANCH="autobump/multipass-${VERSION}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add Casks/multipass.rb "Casks/multipass@${VERSION}.rb"
          git commit -m "multipass: update to ${VERSION} [autobump]"
          git push origin "$BRANCH"
          gh pr create \
            --title "multipass ${VERSION}" \
            --body "Automated version bump from \`${{ steps.compare.outputs.current }}\` to \`${VERSION}\`." \
            --base main \
            --head "$BRANCH" \
            --label autobump 2>/dev/null || true
