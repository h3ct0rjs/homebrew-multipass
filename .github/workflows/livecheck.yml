name: Livecheck

on:
  push:
    branches: [main]
    paths:
      - 'Casks/**'

jobs:
  livecheck:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Tap and overlay merged casks
        run: |
          brew tap h3ct0rjs/multipass https://github.com/h3ct0rjs/homebrew-multipass
          cp Casks/*.rb "$(brew --repository h3ct0rjs/multipass)/Casks/"

      - name: brew livecheck
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: brew livecheck --cask h3ct0rjs/multipass/multipass
